name: Lint

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *' # Daily 6 AM UTC — catch newly disclosed CVEs

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Prettier always runs — it checks markdown, YAML, and JSON formatting too
  prettier:
    name: Prettier
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Prettier formatting
        run: npx prettier --check .

  # ESLint skipped for docs-only changes (no JS/TS to lint)
  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Detect code changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            code:
              - 'src/**'
              - '*.config.*'
              - 'tsconfig.json'

      - name: Setup Node.js
        if: steps.filter.outputs.code == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.filter.outputs.code == 'true'
        run: npm ci

      - name: Run ESLint
        if: steps.filter.outputs.code == 'true'
        run: npx eslint . --max-warnings=10

  # Dependency audit: runs on schedule (daily) or when package files change
  security:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Detect dependency changes
        if: github.event_name != 'schedule'
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            deps:
              - 'package.json'
              - 'package-lock.json'

      - name: Setup Node.js
        if: github.event_name == 'schedule' || steps.filter.outputs.deps == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: github.event_name == 'schedule' || steps.filter.outputs.deps == 'true'
        run: npm ci

      - name: Audit for critical/high vulnerabilities
        if: github.event_name == 'schedule' || steps.filter.outputs.deps == 'true'
        run: npm audit --audit-level=high --omit=dev
