name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.claude/**'
      - 'docs/**'
      - '.github/workflows/**'
      - '.env.local.example'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.claude/**'
      - 'docs/**'
      - '.github/workflows/**'
      - '.env.local.example'
      - 'LICENSE'

jobs:
  build:
    name: Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Create database tables
        run: npx payload migrate
        env:
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET || 'ci-build-placeholder-secret-32chars!' }}
          DATABASE_URI: file:./data/payload.db
          NEXT_PUBLIC_SERVER_URL: http://localhost:3000

      - name: Build
        run: npm run build
        env:
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET || 'ci-build-placeholder-secret-32chars!' }}
          DATABASE_URI: file:./data/payload.db
          NEXT_PUBLIC_SERVER_URL: http://localhost:3000
