version: 2
updates:
  # npm dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
    groups:
      # Group all patch updates into one PR
      patch-updates:
        update-types:
          - 'patch'
      # Group minor updates (non-breaking) into one PR
      minor-updates:
        update-types:
          - 'minor'
    # Major versions get individual PRs (may be breaking)

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels:
      - 'ci'
    groups:
      actions-updates:
        patterns:
          - '*'
