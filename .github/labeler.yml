frontend:
  - changed-files:
      - any-glob-to-any-file: ['src/app/**', 'src/components/**']

cms:
  - changed-files:
      - any-glob-to-any-file: ['src/payload/**', 'payload.config.ts', 'src/app/(payload)/**']

auth:
  - changed-files:
      - any-glob-to-any-file: ['src/lib/auth*.ts', 'src/middleware.ts', 'src/app/api/auth/**']

documentation:
  - changed-files:
      - any-glob-to-any-file: ['docs/**', '*.md', 'CLAUDE.md', '.claude/**']

ci:
  - changed-files:
      - any-glob-to-any-file: ['.github/**']

dependencies:
  - changed-files:
      - any-glob-to-any-file: ['package.json', 'package-lock.json', '.npmrc']

styling:
  - changed-files:
      - any-glob-to-any-file: ['src/app/globals.css', 'tailwind.config.*', 'postcss.config.*']

config:
  - changed-files:
      - any-glob-to-any-file:
          ['*.config.*', '.prettierrc', '.eslintrc*', 'eslint.config.*', 'tsconfig.json']
